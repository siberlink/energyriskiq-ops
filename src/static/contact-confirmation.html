<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmation | EnergyRiskIQ</title>
    <meta name="robots" content="noindex,follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .site-header {
            background: rgba(10, 14, 26, 0.95);
            border-bottom: 1px solid #1e293b;
            padding: 16px 24px;
        }
        .header-inner {
            max-width: 1100px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 20px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.02em; }
        .logo span { color: #3b82f6; }
        .header-nav a { color: #94a3b8; font-size: 14px; margin-left: 20px; }
        .header-nav a:hover { color: #e2e8f0; text-decoration: none; }
        main { flex: 1; width: 100%; max-width: 640px; margin: 0 auto; padding: 64px 24px; }
        .card {
            background: #0f172a; border: 1px solid #1e293b; border-radius: 16px;
            padding: 40px 36px; text-align: center;
        }
        .status-icon { font-size: 52px; margin-bottom: 18px; line-height: 1; }
        h1 { font-size: 26px; font-weight: 800; color: #f1f5f9; margin-bottom: 12px; letter-spacing: -0.02em; }
        .card p { color: #94a3b8; font-size: 15px; line-height: 1.7; margin-bottom: 10px; }
        .spinner {
            width: 44px; height: 44px; margin: 0 auto 20px;
            border: 4px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn {
            display: inline-block; margin-top: 20px;
            background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff;
            font-weight: 700; font-size: 14px; padding: 12px 26px; border-radius: 10px;
        }
        .btn:hover { opacity: 0.92; text-decoration: none; }
        .success h1 { color: #4ade80; }
        .error h1 { color: #f87171; }
        .site-footer { background: #0f172a; border-top: 1px solid #1e293b; padding: 28px 24px; }
        .footer-inner { max-width: 1100px; margin: 0 auto; text-align: center; }
        .footer-links { margin-bottom: 14px; }
        .footer-links a { color: #94a3b8; font-size: 13px; margin: 0 10px; }
        .footer-links a:hover { color: #e2e8f0; }
        .footer-note { color: #64748b; font-size: 12px; line-height: 1.6; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo" style="text-decoration:none;">Energy<span>Risk</span>IQ</a>
            <nav class="header-nav">
                <a href="/">Home</a>
                <a href="/alerts">Alerts</a>
                <a href="/users">Sign In</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="card" id="card">
            <div class="spinner" id="spinner"></div>
            <h1 id="card-title">Confirming your email&hellip;</h1>
            <p id="card-text">Please wait a moment while we confirm your email address and deliver your message.</p>
            <div id="card-actions"></div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <nav class="footer-links">
                <a href="/alerts">Alerts Archive</a>
                <a href="/privacy">Privacy Policy</a>
                <a href="/terms">Terms of Service</a>
                <a href="/contact">Contact</a>
            </nav>
            <p class="footer-note">&copy; 2026 EnergyRiskIQ. All rights reserved.</p>
        </div>
    </footer>

    <script>
        (function () {
            var card = document.getElementById('card');
            var spinner = document.getElementById('spinner');
            var title = document.getElementById('card-title');
            var text = document.getElementById('card-text');
            var actions = document.getElementById('card-actions');

            function render(state, t, msg, actionHtml) {
                spinner.style.display = 'none';
                card.className = 'card ' + state;
                title.innerHTML = t;
                text.textContent = msg;
                actions.innerHTML = actionHtml || '';
            }

            var token = '';
            if (window.location.hash && window.location.hash.indexOf('token=') !== -1) {
                token = window.location.hash.split('token=')[1] || '';
            }
            // Strip token from the address bar/history once read.
            if (window.history && window.history.replaceState) {
                window.history.replaceState(null, '', window.location.pathname);
            }

            if (!token) {
                render('error', '&#10060; Invalid confirmation link',
                    'This confirmation link is incomplete. Please use the "Confirm Email Address" button from the email we sent you, or submit your message again.',
                    '<a class="btn" href="/contact">Back to Contact Page</a>');
                return;
            }

            fetch('/api/contact/confirm-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            }).then(function (resp) {
                return resp.json().then(function (d) { return { ok: resp.ok, data: d }; });
            }).then(function (r) {
                if (r.ok) {
                    render('success', '&#9989; Message Delivered!',
                        r.data.message || 'Your email address is confirmed and your message has been delivered to our team. We typically reply within one business day.',
                        '<a class="btn" href="/">Back to Homepage</a>');
                } else {
                    var detail = r.data && r.data.detail;
                    if (Array.isArray(detail)) detail = detail.map(function (d) { return d.msg || ''; }).join(' ');
                    render('error', '&#10060; Confirmation failed',
                        detail || 'This confirmation link is invalid or has expired. Please submit your message again.',
                        '<a class="btn" href="/contact">Back to Contact Page</a>');
                }
            }).catch(function () {
                render('error', '&#10060; Network error',
                    'We could not reach the server. Please check your connection and reload this page.',
                    '<a class="btn" href="/contact">Back to Contact Page</a>');
            });
        })();
    </script>
</body>
</html>
